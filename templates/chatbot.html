{% extends 'base.html' %}
{% load static %}
{% block main %}
<style>
    .chat-container {
        width: 400px;
        height: 350px;
        background-color: white;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        display: flex;
        border-radius: 5px;
        flex-direction: column;
    }
    .chat-box {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background-color: #fafafa;
        border-bottom: 1px solid #ddd;
        border-radius: 8px 8px 0 0;
        display: flex;
        flex-direction: column;
    }
    .user-message, .bot-message {
        margin: 10px 0;
        padding: 10px;
        border-radius: 8px;
        max-width: 80%;
    }
    .user-message {
        align-self: flex-end;
        background-color: #007bff;
        color: white;
    }
    .bot-message {
        align-self: flex-start;
        background-color: #e9e9e9;
        color: #333;
    }
    section{ height: 480px; }
    .user-input {
        padding: 10px;
        font-size: 16px;
        border: none;
        border-top: 1px solid #ddd;
        outline: none;
        width: calc(100% - 80px);
    }
    .send-btn {
        padding: 10px;
        font-size: 16px;
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        width: 80px;
    }
    .send-btn:hover { background-color: #0056b3; }
</style>
<div style="display: flex;">
    <div style="display: flex;width:300px;height:350px;margin-right:150px;margin-left:100px">
        <img src="{% static 'bot.webp' %}" />
    </div>
    <div class="chat-container">
        <h4 style="display: flex;justify-content:center;">chatBox</h4>
        <div class="chat-box" id="chat-box"></div>
        <div style="display: flex;margin-bottom:10px;padding:5px">
            <input type="text" id="user-input" placeholder="Type a message..." style="border: 1px solid black;" class="user-input">
            <button id="send-btn" class="send-btn">Send</button>
        </div>
    </div>
</div>
<script>
document.getElementById('send-btn').addEventListener('click', sendMessage);
function sendMessage() {
    const userInput = document.getElementById('user-input').value.trim();
    if (userInput !== '') {
        addUserMessage(userInput);
        document.getElementById('user-input').value = '';
        showTypingIndicator();
        sendMessageToBackend(userInput);
    }
}
function addUserMessage(message) {
    const chatBox = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.classList.add('user-message');
    div.textContent = message;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}
function showTypingIndicator() {
    const chatBox = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.classList.add('bot-message');
    div.id = 'typing-indicator';
    div.textContent = 'Chatbot is typing...';
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}
function hideTypingIndicator() {
    const div = document.getElementById('typing-indicator');
    if (div) div.remove();
}
function sendMessageToBackend(userMessage) {
    fetch('/chatbot', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `message=${encodeURIComponent(userMessage)}`
    })
    .then(response => response.json())
    .then(data => {
        hideTypingIndicator();
        addBotMessage(data.response);
    })
    .catch(error => {
        hideTypingIndicator();
        addBotMessage('Sorry, something went wrong.');
    });
}
function addBotMessage(message) {
    const chatBox = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.classList.add('bot-message');
    div.textContent = message;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
{% endblock %}
