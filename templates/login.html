{% extends 'base.html' %}
{% load static %}
{% block main %}
<style>
    .inFormBackground {
        display: flex;
        justify-content: center;
        align-items: center;
        padding-bottom: 30px;
    }
    label{ color: #fff; }
    .inLoginForm {
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 100%;
        border: 1px solid black;
    }
    .inputGroup {
        display: flex;
        flex-direction: column;
        margin-bottom: 15px;
    }
    .inputGroup label { margin-bottom: 5px; font-weight: bold; }
    .inputGroup input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .submitForm {
        display: inline-block;
        padding: 10px 20px;
        background-color:#2357c7;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 20px;
    }
</style>
<div class="inFormBackground">
    <div class="inLoginForm">
        <form action="" method="post">
            {% csrf_token %}
            {% if messages %}
                {% for message in messages %}
                    <p class="message">{{ message }}</p>
                {% endfor %}
            {% endif %}
            <div class="inputGroup">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter Username" required>
            </div>
            <div class="inputGroup">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required>
            </div>
            <button class="submitForm">Login</button>
        </form>
    </div>
</div>
{% endblock %}
